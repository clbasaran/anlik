name: StripMate CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Resolve Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -scheme StripMate \
          -project StripMate.xcodeproj
    
    - name: Build
      run: |
        xcodebuild build \
          -scheme StripMate \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
    
    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme StripMate \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
